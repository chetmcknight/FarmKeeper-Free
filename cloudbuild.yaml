steps:
  # Build the Docker image using the Dockerfile
  # Pass environment variables as build-args so Vite can embed them
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--build-arg'
      - 'VITE_API_KEY=${_API_KEY}'
      - '--build-arg'
      - 'VITE_GS_SHEET_ID=${_GS_SHEET_ID}'
      - '--build-arg'
      - 'VITE_GS_API_KEY=${_GS_API_KEY}'
      - '--build-arg'
      - 'VITE_GS_SCRIPT_URL=${_GS_SCRIPT_URL}'
      - '-t'
      - 'gcr.io/$PROJECT_ID/farmkeeper-free:$COMMIT_SHA'
      - '.'

  # Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/farmkeeper-free:$COMMIT_SHA']

  # Deploy to Cloud Run automatically
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'farmkeeper-free'
      - '--image'
      - 'gcr.io/$PROJECT_ID/farmkeeper-free:$COMMIT_SHA'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'

images:
  - 'gcr.io/$PROJECT_ID/farmkeeper-free:$COMMIT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY